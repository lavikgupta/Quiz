<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz System - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <div class="logo-small">Q</div>
            <span>QuizMaster Admin</span>
        </div>
        <div class="nav-user">
            <span id="welcomeUser">Welcome, Admin</span>
            <button onclick="logout()" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Schedule Section -->
        <div class="card mb-4" id="scheduleCard">
            <div class="flex-header">
                <h2>Quiz Schedule</h2>
            </div>
            <form id="scheduleForm" class="mt-4">
                <div class="form-group">
                    <label for="schedStart">Start Date & Time</label>
                    <input type="datetime-local" id="schedStart" required>
                </div>
                <div class="form-group">
                    <label for="schedEnd">End Date & Time</label>
                    <input type="datetime-local" id="schedEnd" required>
                </div>
                <button type="submit" class="btn btn-primary">Set Schedule</button>
            </form>
            <div id="scheduleMessage" class="mt-2" style="color: green;"></div>
        </div>

        <div class="card">
            <div class="flex-header">
                <h2>Question Management</h2>
                <button onclick="openQuestionModal()" class="btn btn-primary">Add New Question</button>
            </div>
            
            <div class="table-container mt-4">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Option A</th>
                            <th>Option B</th>
                            <th>Option C</th>
                            <th>Option D</th>
                            <th>Correct</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="questionsTableBody">
                        <!-- Questions will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Question Modal -->
    <div id="questionModal" class="modal">
        <div class="modal-content card">
            <div class="flex-header">
                <h3 id="modalTitle">Add Question</h3>
                <span class="close" onclick="closeQuestionModal()">&times;</span>
            </div>
            <form id="questionForm">
                <input type="hidden" id="qId">
                <div class="form-group">
                    <label for="qText">Question Text</label>
                    <textarea id="qText" required rows="3" placeholder="Enter question here..."></textarea>
                </div>
                <div class="form-group">
                    <label for="qOptA">Option A</label>
                    <input type="text" id="qOptA" required>
                </div>
                <div class="form-group">
                    <label for="qOptB">Option B</label>
                    <input type="text" id="qOptB" required>
                </div>
                <div class="form-group">
                    <label for="qOptC">Option C</label>
                    <input type="text" id="qOptC" required>
                </div>
                <div class="form-group">
                    <label for="qOptD">Option D</label>
                    <input type="text" id="qOptD" required>
                </div>
                <div class="form-group">
                    <label for="qCorrect">Correct Option</label>
                    <select id="qCorrect" required>
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>
                    </select>
                </div>
                <div class="flex-end mt-4">
                    <button type="button" class="btn btn-secondary mr-2" onclick="closeQuestionModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Question</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn() || getUserRole() !== 'ADMIN') {
            window.location.href = 'index.html';
        }
        document.getElementById('welcomeUser').textContent = 'Welcome, ' + getUsername();
        
        // Initial load
        loadAdminQuestions();
        loadSchedule();
    </script>
</body>
</html>
